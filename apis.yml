aid: iit-madras
name: Indian Institute of Technology Madras
description: >-
  Indian Institute of Technology Madras (IIT Madras) is a public technical and
  research university in Chennai, India, ranked #227 in the QS World University
  Rankings 2025. It operates an institutional website (iitm.ac.in), a central
  library with electronic databases, a large online BS degree program in Data
  Science and Applications, and SSO/OAuth2-based identity endpoints. As of this
  review IIT Madras does not publish a public, documented developer portal or
  open API program. Its official GitHub organization exists but currently
  exposes no public repositories. The properties cataloged below reflect only
  publicly confirmed institutional web properties and identity endpoints, not
  documented third-party APIs.
