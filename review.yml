    summary: >-
      No public, documented developer portal or open API program was found for
      IIT Madras. The official website (iitm.ac.in), central library
      e-databases page, the BS Data Science study portal, and a CODE portal all
      resolved live (HTTP 200), and an SSO endpoint under iitm.ac.in resolved
      (HTTP 200) but is gated to institutional accounts with no public docs. The
      official GitHub organization (github.com/IIT-Madras) exists but exposes no
      public repositories. No OAI-PMH, DSpace, or open-data API endpoints were
      confirmed. Speculative hostnames (api.iitm.ac.in, docs.api.iitm.ac.in, a
      separate library subdomain, idr.iitm.ac.in) did not resolve. No endpoints
      were fabricated; only URLs actually probed are recorded below.
